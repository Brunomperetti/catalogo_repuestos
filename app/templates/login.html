<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | Catálogo Repuestos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/catalogo.css">
</head>
<body class="admin-body">
<div class="admin-shell" style="max-width:560px;">
    <section class="admin-card">
        <div class="card-header-custom">
            <h1 class="card-title-custom">Ingreso al sistema</h1>
            <p class="card-subtitle-custom">Accedé con tu usuario y contraseña.</p>
        </div>

        {% if error %}
        <div class="alert alert-custom-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="stack-form mt-3">
            <input type="hidden" name="next" value="{{ next }}">
            <div>
                <label class="field-label">Usuario</label>
                <input class="input-custom" type="text" name="username" required autocomplete="username">
            </div>
            <div>
                <label class="field-label">Contraseña</label>
                <input class="input-custom" type="password" name="password" required autocomplete="current-password">
            </div>
            <button class="btn-primary-custom w-100" type="submit">Ingresar</button>
        </form>
    </section>
</div>
</body>
</html>
