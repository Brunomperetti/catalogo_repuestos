<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar producto | {{ producto.codigo }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
<div class="container py-4" style="max-width: 760px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 m-0">Editar producto {{ producto.codigo }}</h1>
        <a href="/admin/productos?empresa={{ empresa.slug }}" class="btn btn-outline-light">Volver al listado</a>
    </div>

    <form method="post" action="/admin/productos/{{ producto.id }}/actualizar" enctype="multipart/form-data" class="card card-body bg-black border-secondary gap-3">
        <input type="hidden" name="empresa_slug" value="{{ empresa.slug }}">

        <div>
            <label class="form-label">Código</label>
            <input class="form-control" name="codigo" value="{{ producto.codigo }}" required>
        </div>

        <div>
            <label class="form-label">Descripción</label>
            <input class="form-control" name="descripcion" value="{{ producto.descripcion }}" required>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Categoría</label>
                <input class="form-control" name="categoria" value="{{ producto.categoria or '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Marca</label>
                <input class="form-control" name="marca" value="{{ producto.marca or '' }}">
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Stock</label>
                <input class="form-control" type="number" name="stock" value="{{ producto.stock or 0 }}" min="0">
            </div>
            <div class="col-md-6">
                <label class="form-label">Precio</label>
                <input class="form-control" type="number" name="precio" value="{{ producto.precio }}" step="0.01" min="0" required>
            </div>
        </div>

        <div class="form-check mt-1">
            <input class="form-check-input" type="checkbox" name="activo" id="activo" {% if producto.activo %}checked{% endif %}>
            <label class="form-check-label" for="activo">Producto activo (visible en catálogo público)</label>
        </div>

        <div>
            <label class="form-label">Imagen del producto (opcional)</label>
            <input class="form-control" type="file" name="imagen" accept="image/*">
            <small class="text-secondary">Si cargás una imagen, reemplaza la actual por código.</small>
        </div>

        <button class="btn btn-primary" type="submit">Guardar cambios</button>
    </form>
</div>
</body>
</html>
